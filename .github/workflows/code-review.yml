name: Code Review AI

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run AI Code Review
        uses: villesau/ai-codereiview@main
        with:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
