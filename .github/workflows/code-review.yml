name: Code Review AI

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      # ✅ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Setup Node (required for Angular build)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ Install dependencies
      - name: Install dependencies
        run: npm ci

      # ✅ Build Angular app
      - name: Build Angular App
        run: npm run build -- --configuration=production

      # ✅ Run your AI Action
      - name: Run AI Code Review
        uses: laxman0702/ai-codereiview@main
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
